<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Deine Spielzeuge</title>
        <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
    </head>
    <body>
        <header>
            <div class="header_logo">
                <img src="/images/sortino_bildmarke.png" alt="SortinoLogo" />
            </div>
            <div class="header_text">
                <h1>Spielzeuge</h1>
                <h2><span id="toys_total">–</span> Spielzeuge registriert</h2>
            </div>
            <button class="header_action-btn" id="addToy">
                <a href="name_toy.html">+</a>
            </button>
        </header>

        <main>
            
            <div class="toy_usage-chart">
                <h3>Nutzungshäufigkeit</h3>
                <p class="chart_header">Letzte 7 Tage</p>
                <li>
                    <p>
                        <span id="chart_toyName">Spielzeug</span>
                        <span id="chart_usage"> ×</span>
                    </p>
                </li>
            </div>

            <div class="toy_list">
                <h3>Alle Spielzeuge</h3>
                <ul id="toyList">
                    <li>
                        <img src="" alt="toyIcon">
                        <p class="toy_name">Spielzeug</p>
                        <p class="toy_usage"><span id="toy_usage_count">–</span> Nutzungen in den letzten 7 Tagen</p>
                        <img src="" alt="editIcon">
                        <img src="" alt="deleteIcon">
                        <p class="toy_status">Status</p>
                    </li>
                </ul>

        </main>

        <footer>
        <nav id="navigation" aria-label="Hauptnavigation">
            <a href="index.html">
                <span>Übersicht</span>
            </a>
            <a href="toy.html" class="active" aria-current="page">
                <span>Spielzeuge</span>
            </a>
            <a href="settings.html">
                <span>Einstellungen</span>
            </a>
        </nav>
        </footer>
        <script src="/js/auth.js"></script>
        <script src="/js/toy.js"></script>
    </body>
</html>
