<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spielzeug hinzufügen</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
</head>
<body class="form-page">
    <main class="form-shell">

        <section class="form-card">
            <div class="form-stack">
                <div>
                    <h1 class="form-title">Spielzeug in die Kiste legen</h1>
                    <p class="form-copy">Bitte lege das Spielzeug jetzt in die Kiste.</p>
                </div>

                <div class="choice-grid">
                    <button class="form-button" type="button" id="backToNameButton">Zurück</button>
                    <button class="secondary-button" type="button" id="skipToDashboardButton">Später hinzufügen</button>
                </div>

                <p id="toyMessage" class="form-message"></p>
            </div>
        </section>
    </main>

    <div id="toyAddedOverlay" class="popup-overlay hidden">
        <div class="popup" role="dialog" aria-modal="true" aria-labelledby="toyAddedTitle">
            <p id="toyAddedTitle">Das Spielzeug wurde erfolgreich hinzugefügt</p>
            <button id="continueToyAddedBtn" type="button">Weiter</button>
        </div>
    </div>

    <footer></footer>
    <script src="/js/auth.js"></script>
    <script src="/js/add_toy.js"></script>
</body>
</html>
