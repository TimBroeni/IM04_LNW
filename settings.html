<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Einstellungen</title>
        <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
    </head>
    <body class="app-page settings-page">
    <header class="app-header">
        <div class="header_logo">
            <img src="/images/sortino_bildmarke.png" alt="SortinoLogo" />
        </div>
        <div class="header_text">
            <h1 class="page-title">Einstellungen</h1>
        </div>
    </header>
    <main class="app-main settings-main">

<!-- KISTENÜBERSICHT -->
        <section class="settings-card settings-card--boxes">
            <h2>Kistenübersicht</h2>
            <a href="new_box.html" class="settings-action-link">
                <button id="newBoxBtn" type="button">Neue Kiste</button>
            </a>
            <ul id="boxList" class="box-list">
                <!-- Kisten werden hier dynamisch hinzugefügt -->
            </ul>
        </section>
    
<!-- HAUSHALTSMITGLIEDER -->
        <section class="settings-card settings-card--household">
            <h2 id="householdName">Dein Zuhause</h2>
            <p class="settings-meta">Dein Haushaltscode: <span id="householdCode"></span></p>
            <ul id="householdMembersList" class="household-members-list">
                <!-- Mitglieder werden hier dynamisch hinzugefügt -->
            </ul>
        </section>

<!-- ACTIONS -->
        <div class="settings-actions">
            <a href="profil.html" id="editProfileBtn" class="settings-text-btn settings-text-btn--profile" role="button">Profil bearbeiten</a>
            <button id="logoutBtn" class="secondary-button settings-logout-btn settings-text-btn settings-text-btn--logout" type="button">Abmelden</button>
        </div>

    </main>
<!-- POPUPS -->
        <div id="removeMemberOverlay" class="popup-overlay hidden">
            <div class="popup" role="dialog" aria-modal="true" aria-labelledby="removeMemberTitle">
                <p id="removeMemberTitle">Möchtest du diesen Haushaltsmember wirklich aus dem Haushalt entfernen?</p>
                <div class="popup-actions">
                    <button id="cancelRemoveMemberBtn" class="popup-btn-danger" type="button">Abbrechen</button>
                    <button id="confirmRemoveMemberBtn" class="popup-btn-neutral" type="button">Fortfahren</button>
                </div>
            </div>
        </div>

        <div id="removeBoxOverlay" class="popup-overlay hidden">
            <div class="popup" role="dialog" aria-modal="true" aria-labelledby="removeBoxTitle">
                <p id="removeBoxTitle">Möchtest du diese Kiste wirklich aus dem Haushalt entfernen?</p>
                <div class="popup-actions">
                    <button id="cancelRemoveBoxBtn" class="popup-btn-danger" type="button">Abbrechen</button>
                    <button id="confirmRemoveBoxBtn" class="popup-btn-neutral" type="button">Fortfahren</button>
                </div>
            </div>
        </div>

        <div id="logoutOverlay" class="popup-overlay hidden">
            <div class="popup" role="dialog" aria-modal="true" aria-labelledby="logoutTitle">
                <p id="logoutTitle">Möchtest du dich wirklich abmelden?</p>
                <div class="popup-actions">
                    <button id="cancelLogoutBtn" class="popup-btn-danger" type="button">Abbrechen</button>
                    <button id="confirmLogoutBtn" class="popup-btn-neutral" type="button">Fortfahren</button>
                </div>
            </div>
        </div>

        <footer class="app-footer">
            <nav id="navigation" class="primary-navigation" aria-label="Hauptnavigation">
        <a href="index.html">
            <span>Übersicht</span>
        </a>
        <a href="toys.html">
            <span>Spielzeuge</span>
        </a>
        <a href="settings.html" class="active" aria-current="page">
            <span>Einstellungen</span>
        </a>
      </nav>
    </footer>
    <script src="/js/auth.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/logout.js"></script>
    </body>
</html>
