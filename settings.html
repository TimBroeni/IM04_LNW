<!DOCTYPE html>

    <header>

        </div>
        <div class="header_text">
            <h1>Einstellungen</h1>

    <main>

<!-- PROFIL BEARBEITEN -->

<!-- KISTENÜBERSICHT -->

<!-- HAUSHALTSMITGLIEDER -->

<!-- LOGOUT BUTTON -->
    <br>
    <button id="logoutBtn">Logout</button>


    </main>

        <div id="removeMemberOverlay" class="popup-overlay hidden">
            <div class="popup" role="dialog" aria-modal="true" aria-labelledby="removeMemberTitle">

                <div class="popup-actions">
                    <button id="confirmRemoveMemberBtn" class="popup-btn-neutral" type="button">Fortfahren</button>
                    <button id="cancelRemoveMemberBtn" class="popup-btn-danger" type="button">Abbrechen</button>

            </div>
        </div>
