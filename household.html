<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haushalt hinzufügen/beitreten</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
</head>
<body>
    <main>
        <h1>Haushalt verwalten</h1>
        <p>Du kannst entweder einen neuen Haushalt erstellen oder einem bestehenden Haushalt mit Code beitreten.</p>

        <section>
            <h2>Neuen Haushalt erstellen</h2>
            <form id="createHouseholdForm">
                <label for="household_name">Haushaltsname</label>
                <input type="text" id="household_name" name="household_name" required />
                <button type="submit">Haushalt erstellen</button>
            </form>
        </section>

        <section>
            <h2>Bestehendem Haushalt beitreten</h2>
            <form id="joinHouseholdForm">
                <label for="household_code">Haushaltscode</label>
                <input type="text" id="household_code" name="household_code" maxlength="6" required />
                <button type="submit">Haushalt beitreten</button>
            </form>
        </section>

        <p id="householdMessage"></p>
    </main>

<footer></footer>
<script src="/js/auth.js"></script>
<script src="/js/data.js"></script>
<script src="/js/household.js"></script>
</body>
</html>
