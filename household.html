<!DOCTYPE html>
<!-- Haushaltsauswahl
    - Bietet den Einstieg in neue oder bestehende Haushalte
    - Führt per Button weiter zu Erstellen oder Beitreten
    - Löst keine Eingabe aus, sondern nur Navigation
    - Dient als Zwischenseite vor der Haushaltsanlage -->
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haushalt hinzufügen/beitreten</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
</head>
<body class="form-page">
    <main class="form-shell">

        <section class="form-card">
            <div class="form-stack">
                <div>
                    <h1 class="form-title">Haushalt verwalten</h1>
                    <p class="form-copy">Möchtest du einem bestehenden Haushalt beitreten oder einen neuen Haushalt erstellen?</p>
                </div>

                <div class="choice-grid">
                    <button class="form-button" type="button" onclick="window.location.href='/new_household.html'">Neuen Haushalt erstellen</button>
                    <button class="secondary-button" type="button" onclick="window.location.href='/join_household.html'">Einem Haushalt beitreten</button>
                </div>
            </div>
        </section>
    </main>

    <footer></footer>
    <script src="/js/auth.js"></script>
</body>
</html>
