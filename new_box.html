<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sortino-Kiste hinzufügen</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
</head>
<body class="form-page">
    <main class="form-shell">

        <section class="form-card">
            <div class="form-stack">
                <div>
                    <h1 class="form-title">Sortino-Kiste hinzufügen</h1>
                    <p class="form-copy">Suche unter deiner Sortino-Kiste die Seriennummer und vergib einen Namen für die Box.</p>
                </div>

                <form id="newBoxForm" class="form-layout">
                    <div class="field">
                        <label for="box_serialnumber">Seriennummer</label>
                        <div class="field-input">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <rect x="4" y="6" width="16" height="12" rx="2.5" stroke="currentColor" stroke-width="1.8" />
                                    <path d="M7 10h10M7 14h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </span>
                            <input type="text" id="box_serialnumber" name="box_serialnumber" required />
                        </div>
                    </div>

                    <div class="field">
                        <label for="box_name">Name der Kiste</label>
                        <div class="field-input">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M4.5 12.5 12 4l7.5 8.5V20h-15v-7.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                                </svg>
                            </span>
                            <input type="text" id="box_name" name="box_name" required />
                        </div>
                    </div>

                    <button class="form-button" type="submit">Weiter</button>
                </form>

                <p id="boxMessage" class="form-message"></p>
            </div>
        </section>

    </main>

    <footer></footer>
    <script src="/js/auth.js"></script>
    <script src="/js/new_box.js"></script>
</body>
</html>
