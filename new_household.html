<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neuen Haushalt erstellen</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
</head>
<body>
    <main>
        <h1>Neuen Haushalt erstellen</h1>
        <p>Gib einen Namen für deinen Haushalt ein.</p>

        <form id="createHouseholdForm">
            <label for="household_name">Haushaltsname</label>
            <input type="text" id="household_name" name="household_name" required />
            <button type="submit">Haushalt erstellen</button>
        </form>

        <button type="button" onclick="window.location.href='/household.html'">Zurück</button>

        <p id="householdMessage"></p>
    </main>

    <footer></footer>
    <script src="/js/auth.js"></script>
    <script src="/js/new_household.js"></script>
</body>
</html>
