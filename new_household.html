<!DOCTYPE html>
<!-- Neuen Haushalt erstellen
    - Sammelt den Namen für einen neuen Haushalt
    - Sendet die Eingabe an das Erstellungs-Skript
    - Bietet eine Zurück-Schaltfläche zur Auswahlseite
    - Zeigt Rückmeldungen im Nachrichtenbereich an -->
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neuen Haushalt erstellen</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
</head>
<body class="form-page">
    <main class="form-shell">

        <section class="form-card">
            <div class="form-stack">
                <div>
                    <h1 class="form-title">Neuen Haushalt erstellen</h1>
                    <p class="form-copy">Gib einen Namen für deinen Haushalt ein.</p>
                </div>

                <form id="createHouseholdForm" class="form-layout">
                    <div class="field">
                        <label for="household_name">Haushaltsname</label>
                        <div class="field-input">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <circle cx="12" cy="8.5" r="3.5" stroke="currentColor" stroke-width="1.8" />
                                    <path d="M5 19c1.5-3.3 4.1-5 7-5s5.5 1.7 7 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </span>
                            <input type="text" id="household_name" name="household_name" required />
                        </div>
                    </div>

                    <button class="form-button" type="submit">Haushalt erstellen</button>
                </form>

                <button class="secondary-button" type="button" onclick="window.location.href='/household.html'">Zurück</button>

                <p id="householdMessage" class="form-message"></p>
            </div>
        </section>
    </main>

    <footer></footer>
    <script src="/js/auth.js"></script>
    <script src="/js/new_household.js"></script>
</body>
</html>
