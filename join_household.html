<!DOCTYPE html>
<!-- Haushalt beitreten
    - Nimmt einen Haushaltscode im Formular entgegen
    - Sendet den Code an das Join-Skript beim Absenden
    - Zeigt Rückmeldungen im Nachrichtenbereich an
    - Führt bei Erfolg zu dem bestehenden Haushalt -->
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haushalt beitreten</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
</head>
<body class="form-page">
    <main class="form-shell">

        <section class="form-card">
            <div class="form-stack">
                <div>
                    <h1 class="form-title">Einem Haushalt beitreten</h1>
                    <p class="form-copy">Gib den Haushaltscode ein, um einem bestehenden Haushalt beizutreten.</p>
                </div>

                <form id="joinHouseholdForm" class="form-layout">
                    <div class="field">
                        <label for="household_code">Haushaltscode</label>
                        <div class="field-input">
                            <span class="field-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <rect x="4" y="6" width="16" height="12" rx="2.5" stroke="currentColor" stroke-width="1.8" />
                                    <path d="M8 12h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                                </svg>
                            </span>
                            <input type="text" id="household_code" name="household_code" maxlength="6" required />
                        </div>
                    </div>

                    <button class="form-button" type="submit">Haushalt beitreten</button>
                </form>

                <button class="secondary-button" type="button" onclick="window.location.href='/household.html'">Zurück</button>

                <p id="householdMessage" class="form-message"></p>
            </div>
        </section>
    </main>

    <footer></footer>
    <script src="/js/auth.js"></script>
    <script src="/js/join_household.js"></script>
</body>
</html>
