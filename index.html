<!doctype html>
  <!-- Dashboard-Startseite
    zeigt den aktuellen Haushaltsnamen und die Begrüßung
    zeigt Spielzeug- und Kisten-Übersicht in kompakten Karten
    listet Spielzeuge außerhalb der Kiste samt Status
    bindet Navigation, Styling und Dashboard-Skripte ein -->
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
  </head>
  <body class="app-page dashboard-page">
    <header class="app-header">
      <div class="header_logo">
        <img src="/images/sortino_bildmarke.png" alt="SortinoLogo" />
      </div>
      <div class="header_text">
        <h1 class="page-title">Übersicht</h1>
        <p id="householdName" class="householdName">Dein Zuhause</p>
      </div>
    </header>

    <main class="app-main dashboard-main">
      <h2 id="welcomeMessage" class="welcome-message dashboard-greeting">Hallo <span id="userName">–</span></h2>
      <div class="dashboard_cards dashboard-metrics">
        <div class="dashboard_card1 dashboard-card dashboard-card--summary">
          <div class="dashboard_card1_allToys">
            <img src="/images/nav/nav_toys.svg" alt="Spielzeuge" />
            <p id="toyCount">–</p>
            <p>Spielzeuge</p>
          </div>
          <div class="dashboard_card1_allToys">
            <p id="toySorted">–</p>
            <p>versorgt</p>
          </div>
        </div>

        <div class="dashbaord_card-2 dashboard-card dashboard-card--count">
          <div class="dashboard_card2_allBoxes">
            <img src="/images/nav/nav_points.svg" alt="Kisten" />
            <p id="boxCount">–</p>
            <p>Kisten</p>
          </div>
        </div>
      </div>
      
      <section class="dashboard_toys-outside dashboard-card dashboard-card--warning">
        <h2 id="outsideToysHeading" class="hidden">Spielzeuge ausserhalb der Kiste</h2>
        <div id="toy_out" class="dashboard_toys-outside-list"></div>
      </section>

      <div class="dashboard_clear hidden dashboard-card dashboard-card--success" id="dashboardClear">
        <p>Alles aufgeräumt!</p>
      </div>

    </main>
    <footer class="app-footer">
      <nav id="navigation" class="primary-navigation" aria-label="mainnavigation">
        <a href="index.html" class="active" aria-current="page">
          <span>Übersicht</span>
        </a>
        <a href="toys.html">
          <span>Spielzeuge</span>
        </a>
        <a href="settings.html">
          <span>Einstellungen</span>
        </a>
      </nav>
    </footer>
    <script src="/js/auth.js"></script>
    <script src="/js/data.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
