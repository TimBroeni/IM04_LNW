<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="icon" type="image/png" href="/images/Favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
  </head>
  <body>
    <header>
      <div class="header_logo">
        <img src="/images/sortino_bildmarke.png" alt="SortinoLogo" />
      </div>
      <div class="header_text">
        <h1>Übersicht</h1>
        <h2 class="householdName">Dein Zuhause</h2>
      </div>
    </header>

    <main>

      <div class="dashboard_cards">
        <div class="dashboard_card1">
          <div class="dashboard_card1_allToys">
            <img src="" alt="">
            <p id="toyCount">–</p>
            <p>Spielzeuge</p>
          </div>
          <div class="dashboard_card1_allToys">
            <p id="toySorted">–</p>
            <p>versorgt</p>
          </div>
        </div>

        <div class="dashbaord_card-2">
          <div class="dashboard_card2_allBoxes">
            <img src="" alt="">
            <p id="boxCount">–</p>
            <p>Kisten</p>
          </div>
        </div>
      </div>

      </div>
      <section class="dashboard_toys-outside">
        <h2>Spielzeuge ausserhalb der Kiste</h2>
        <div id="toy_out" class="dashboard_toys-outside-list"></div>
      </section>

    <div class="all-clear" id="allClear" style="display: none;">
      <p>Alles aufgeräumt!</p>
    </div>

    <!-- This is where we'll dynamically show the protected content -->
    <div id="protectedContent">
      <h2>Welcome, <span id="firstname"></span></h2>
    </div>
    <p>Dies ist die Homepage des Dashboards, glaube ich</p>

    <button id="logoutBtn">Logout</button>
    <a href="profil.html">
      <button id="editProfileBtn">Profil bearbeiten</button>
    </a>
    </main>
    <footer>
      <nav id="navigation" aria-label="mainnavigation">
        <a href="index.html" class="active" aria-current="page">
          <span>Übersicht</span>
        </a>
        <a href="toy.html">
          <span>Spielzeuge</span>
        </a>
        <a href="einstellungen.html">
          <span>Einstellungen</span>
        </a>
      </nav>
    </footer>
    <script src="/js/auth.js"></script>
    <script src="/js/data.js"></script>
    <script src="/js/logout.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
