<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil</title>
    <link rel="icon" type="image/png" href="/images/sortino_favicon.png">
    <link rel="stylesheet" href="/css/master.css" />
    <link rel="stylesheet" href="/css/mobile.css" />
    <link rel="stylesheet" href="/css/desktop.css" />
  </head>
  <body class="form-page">
    <main class="form-shell">
      <section class="form-brand" aria-label="Sortino">
        <img src="/images/sortino_marke.png" alt="Sortino" class="brand-mark" />
        <h1 class="brand-wordmark">Sortino</h1>
        <p class="brand-subtitle">Profil bearbeiten</p>
      </section>

      <section class="form-card">
        <h2 class="profile-title">Profil</h2>

        <form id="profilForm" class="form-layout">
          <div class="field">
            <label for="email">E-Mail</label>
            <div class="field-input">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="3" y="5" width="18" height="14" rx="2.5" stroke="currentColor" stroke-width="1.8" />
                  <path d="M4.5 7.5L12 13L19.5 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
              </span>
              <input type="email" id="email" required autocomplete="email" />
            </div>
          </div>

          <div class="field">
            <label for="firstname">Vorname</label>
            <div class="field-input">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <circle cx="12" cy="8.5" r="3.5" stroke="currentColor" stroke-width="1.8" />
                  <path d="M5 19c1.5-3.3 4.1-5 7-5s5.5 1.7 7 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input type="text" id="firstname" required />
            </div>
          </div>

          <div class="field">
            <label for="lastname">Nachname</label>
            <div class="field-input">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <circle cx="12" cy="8.5" r="3.5" stroke="currentColor" stroke-width="1.8" />
                  <path d="M5 19c1.5-3.3 4.1-5 7-5s5.5 1.7 7 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input type="text" id="lastname" />
            </div>
          </div>

          <div class="field">
            <label for="password">Neues Passwort</label>
            <div class="field-input">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="5" y="10" width="14" height="10" rx="2.5" stroke="currentColor" stroke-width="1.8" />
                  <path d="M8 10V7.5C8 5.57 9.57 4 11.5 4H12.5C14.43 4 16 5.57 16 7.5V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              <input type="password" id="password" autocomplete="new-password" placeholder="••••••••" />
            </div>
          </div>

          <button class="form-button" type="submit">Anpassen</button>
        </form>

        <div class="profile-actions">
          <button id="logoutBtn" class="secondary-button" type="button">Logout</button>
          <a class="secondary-button link-button" href="index.html">Zurück</a>
        </div>
      </section>
    </main>

    <div id="successOverlay" class="popup-overlay hidden">
      <div class="popup" role="dialog" aria-modal="true" aria-labelledby="profileSuccessTitle">
        <p id="profileSuccessTitle">Ihr Profil wurde erfolgreich aktualisiert.</p>
        <button id="popupContinueBtn" type="button">Weiter</button>
      </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/data.js"></script>
    <script src="/js/profil.js"></script>
    <script src="/js/logout.js"></script>
  </body>
</html>
